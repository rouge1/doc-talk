<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>doctalk{% block title %}{% endblock %}</title>
  <style>
    :root { --fg:#1c1c1e; --muted:#6b6b70; --line:#e3e3e6; --accent:#2a5db0; --bg:#fafafa; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           color:var(--fg); background:var(--bg); }
    nav { background:#fff; border-bottom:1px solid var(--line); padding:.7rem 1.2rem;
          position:sticky; top:0; display:flex; gap:1rem; align-items:center; }
    nav a { text-decoration:none; color:var(--muted); }
    nav a.brand { font-weight:700; color:var(--fg); margin-right:.4rem; }
    nav a:hover { color:var(--accent); }
    main { max-width:920px; margin:1.6rem auto; padding:0 1.2rem; }
    h1 { font-size:1.4rem; } h2 { font-size:1.1rem; margin-top:1.6rem; }
    a { color:var(--accent); }
    .muted { color:var(--muted); font-size:.86rem; }
    form.q { display:flex; gap:.5rem; margin:1rem 0 1.4rem; flex-wrap:wrap; }
    form.q input[type=text]{ flex:1; min-width:240px; padding:.55rem .7rem; border:1px solid var(--line);
                             border-radius:8px; font-size:1rem; }
    form.q input[type=number]{ width:110px; padding:.55rem; border:1px solid var(--line); border-radius:8px; }
    button { padding:.55rem 1rem; border:0; border-radius:8px; background:var(--accent); color:#fff;
             font-size:.95rem; cursor:pointer; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:.9rem 1rem; margin:.7rem 0; }
    .score { font-variant-numeric:tabular-nums; color:var(--accent); font-weight:600; }
    .crumb { font-size:.8rem; color:var(--muted); }
    ul.tree { list-style:none; padding-left:0; }
    ul.tree li { margin:.12rem 0; }
    pre.chunk { white-space:pre-wrap; background:#fff; border:1px solid var(--line); border-radius:8px;
                padding:.7rem .9rem; font:13px/1.5 ui-monospace,Menlo,monospace; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:1rem; }
    .grid figure { margin:0; background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    .grid img { width:100%; height:150px; object-fit:contain; background:#f0f0f2; display:block; }
    .grid figcaption { padding:.55rem .7rem; font-size:.8rem; }
    .answer { white-space:pre-wrap; background:#fff; border:1px solid var(--line); border-radius:10px;
              padding:1rem 1.1rem; }

    /* --- synthesis wiki: "the scholar's notebook" (authored prose, distinct from the raw library) --- */
    :root { --wiki-accent:#9a6b3f; --wiki-paper:#fffdf9; --wiki-ink:#2b2620; }
    .wiki-serif { font-family:Georgia,Palatino,serif; color:var(--wiki-ink); }
    .wiki-hero { position:relative; overflow:hidden; border:1px solid var(--line); border-radius:14px;
                 background:linear-gradient(170deg,var(--wiki-paper),#fff 70%); padding:1.5rem 1.6rem; }
    .wiki-hero::after { content:""; position:absolute; inset:0; pointer-events:none; opacity:.55;
                 background-image:radial-gradient(var(--line) 1px, transparent 1px); background-size:15px 15px;
                 -webkit-mask:linear-gradient(225deg,#000,transparent 55%); mask:linear-gradient(225deg,#000,transparent 55%); }
    .wiki-hero h1 { font-family:Georgia,Palatino,serif; font-size:1.8rem; margin:0 0 .25rem;
                 letter-spacing:.2px; color:var(--wiki-ink); position:relative; }
    .wiki-hero .lede { color:var(--muted); font-size:.92rem; max-width:48ch; position:relative; }
    .wiki-stats { display:flex; gap:1.8rem; margin-top:1.1rem; position:relative; }
    .wiki-stats b { display:block; font-family:Georgia,serif; font-size:1.5rem; line-height:1;
                 color:var(--wiki-accent); font-variant-numeric:tabular-nums; }
    .wiki-stats span { font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }
    /* source = the top rung of the synthesis ladder, so it carries real metadata, not just a link */
    .source-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:.8rem; }
    .source-card { display:block; text-decoration:none; color:var(--wiki-ink); background:var(--wiki-paper);
                 border:1px solid var(--line); border-radius:12px; padding:.85rem 1rem;
                 transition:border-color .15s, box-shadow .15s; }
    .source-card:hover { border-color:var(--wiki-accent); box-shadow:0 1px 0 #f0ebe2; }
    .source-card-head { display:flex; align-items:baseline; gap:.5rem; }
    .source-name { font-family:Georgia,Palatino,serif; font-size:1.12rem; line-height:1.2; color:var(--wiki-ink); }
    .source-card:hover .source-name { text-decoration:underline; }
    .source-fmt { margin-left:auto; font-size:.62rem; text-transform:uppercase; letter-spacing:.1em;
                 color:var(--wiki-accent); border:1px solid #e7d6bf; border-radius:999px; padding:.1rem .45rem; }
    .source-stats { display:flex; gap:1.5rem; margin:.75rem 0 0; }
    .source-stats dt { font-family:Georgia,serif; font-size:1.18rem; line-height:1; color:var(--wiki-accent);
                 font-variant-numeric:tabular-nums; }
    .source-stats dd { margin:.12rem 0 0; font-size:.63rem; text-transform:uppercase; letter-spacing:.09em;
                 color:var(--muted); }
    .source-date { margin:.6rem 0 0; font-size:.72rem; color:var(--muted); }
    .type-group { margin-top:1.7rem; }
    .type-head { font-family:Georgia,serif; font-size:.74rem; text-transform:uppercase; letter-spacing:.13em;
                 color:var(--wiki-accent); font-weight:700; border-bottom:1px solid var(--line);
                 padding-bottom:.3rem; margin:0 0 .7rem; }
    .entity-list { list-style:none; padding:0; margin:0;
                 display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:.55rem .9rem; }
    .entity-list a { font-family:Georgia,serif; font-size:1.02rem; text-decoration:none; }
    .entity-list a:hover { text-decoration:underline; }
    .entity-list .meta { color:var(--muted); font-size:.72rem; font-variant-numeric:tabular-nums; }
    .review-banner { display:inline-flex; align-items:center; gap:.45rem; margin-top:1rem;
                 padding:.35rem .75rem; border-radius:999px; background:#fdf3e7; border:1px solid #ecd9bf;
                 color:#8a5a2b; font-size:.82rem; text-decoration:none; }
    .wiki-doc { background:var(--wiki-paper); border:1px solid var(--line); border-radius:14px;
                 padding:1.7rem 2rem; box-shadow:0 1px 0 #f0ebe2; }
    .wiki-doc .wiki-title { font-family:Georgia,Palatino,serif; font-size:1.9rem; margin:.1rem 0 .35rem;
                 color:var(--wiki-ink); letter-spacing:.2px; }
    .wiki-doc h2 { font-family:Georgia,serif; font-size:.82rem; text-transform:uppercase; letter-spacing:.11em;
                 color:var(--wiki-accent); border-bottom:1px solid var(--line); padding-bottom:.25rem; margin:1.6rem 0 .7rem; }
    .wiki-doc p { margin:.5rem 0; } .wiki-doc .wiki-meta { color:var(--muted); font-size:.83rem; margin-top:0; }
    .wiki-doc ul.wiki-list { padding-left:0; list-style:none; }
    .wiki-doc ul.wiki-list li { position:relative; padding-left:1.1rem; margin:.4rem 0; }
    .wiki-doc ul.wiki-list li::before { content:"›"; position:absolute; left:0; color:var(--wiki-accent); }
    .wiki-doc .cite { color:var(--muted); font-size:.8rem; }
    .wiki-doc hr { border:0; border-top:1px solid var(--line); margin:1.4rem 0; }
    .wikilink { color:var(--accent); text-decoration:none; border-bottom:1px dotted var(--accent); }
    .wikilink:hover { background:#eef3fb; }
    .crumb-wiki { color:var(--wiki-accent); }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">doctalk</a>
    <a href="/">Home</a>
    <a href="/search">Search</a>
    <a href="/chat">Chat</a>
    <a href="/gallery">Gallery</a>
    <a href="/wiki">Wiki</a>
  </nav>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
